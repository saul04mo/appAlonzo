name: alonzoapp
description: "ALONZO - Premium Fashion E-commerce"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  # ── Firebase ──────────────────────────────────────────────
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  google_sign_in: ^6.2.2
  cloud_firestore: ^6.1.2
  firebase_storage: ^13.0.6

  # ── State Management ──────────────────────────────────────
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # ── Routing ───────────────────────────────────────────────
  go_router: ^14.8.1

  # ── Models / Serialization ────────────────────────────────
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # ── UI / Images ───────────────────────────────────────────
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1
  smooth_page_indicator: ^1.2.0
  google_fonts: ^6.3.3
  flutter_staggered_animations: ^1.1.1

  # ── Utilities ─────────────────────────────────────────────
  intl: ^0.19.0
  uuid: ^4.5.1
  equatable: ^2.0.7
  shared_preferences: ^2.3.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # ── Code Generation ───────────────────────────────────────
  build_runner: ^2.4.13
  freezed: 3.1.0
  json_serializable: ^6.9.5
  riverpod_generator: ^2.6.4
  custom_lint: ^0.7.3
  riverpod_lint: ^2.6.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
